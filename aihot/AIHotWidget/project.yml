name: AIHotWidget
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0"
    DEVELOPMENT_TEAM: ""
targets:
  AIHot:
    type: application
    platform: iOS
    sources:
      - path: AIHotApp
      - path: Shared
    info:
      path: AIHotApp/Info.plist
      properties:
        CFBundleDisplayName: AI HOT
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.aihotwidget
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    dependencies:
      - target: AIHotWidgets
        embed: true

  AIHotWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: AIHotWidgets
      - path: Shared
    info:
      path: AIHotWidgets/Info.plist
      properties:
        CFBundleDisplayName: AI HOT Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.aihotwidget.widgets
        PRODUCT_NAME: AIHotWidgets
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES

  AIHotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AIHotTests
    dependencies:
      - target: AIHot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.aihotwidget.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  AIHot:
    build:
      targets:
        AIHot: all
        AIHotWidgets: all
        AIHotTests:
          - test
    test:
      targets:
        - AIHotTests
